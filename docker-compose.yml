services:
  report-vault:
    build: .
    container_name: report-vault
    restart: unless-stopped
    ports:
      - "8003:8000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 3

